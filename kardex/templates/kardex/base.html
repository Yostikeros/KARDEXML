<!doctype html>
{% load static %}
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kardex XML</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}?v=20260627-1" rel="stylesheet">
</head>
<body>
{% with current=request.resolver_match.url_name %}
<div class="app-layout">
    <aside class="app-sidebar d-none d-lg-flex">
        <div class="app-sidebar-inner">
            {% include "kardex/partials/sidebar_nav.html" %}
        </div>
    </aside>

    <header class="mobile-topbar d-lg-none">
        <a class="app-brand" href="{% url 'kardex:dashboard' %}">
            <span class="app-brand-mark">KX</span>
            <span class="app-brand-text">
                <span class="app-brand-name">Kardex XML</span>
                <span class="app-brand-subtitle">Inventario</span>
            </span>
        </a>
        <button class="mobile-menu-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-label="Abrir menu">Menu</button>
    </header>

    <div class="offcanvas offcanvas-start app-mobile-sidebar d-lg-none" tabindex="-1" id="mobileSidebar">
        <div class="offcanvas-body p-3">
            <div class="app-sidebar-inner">
                {% include "kardex/partials/sidebar_nav.html" %}
            </div>
        </div>
    </div>

    <main class="app-main">
        <div class="app-content">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
{% endwith %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
